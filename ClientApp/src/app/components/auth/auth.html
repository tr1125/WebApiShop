<!-- Auth Page - Cream & Wood Theme -->
<div class="flex flex-col min-h-screen w-full bg-[linear-gradient(135deg,#fdfbf7_0%,#a68b6c_100%)] text-[#5d4037] font-sans" dir="rtl">
  
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky top-0 z-50" 
       style="background: #efebe9 !important; border-bottom: 1px solid #d7ccc8; box-shadow: none;">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold hover:scale-110 transition" routerLink="/" style="color: #5d4037 !important; letter-spacing: 0; display: flex; align-items: center; gap: 0.5rem;">
        <div style="width: 48px; height: 48px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; border: 1px solid #d7ccc8;">
          <img src="/images/icons/logo.png" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        Room Design Studio
      </a>
      <button class="navbar-toggler" type="button" 
              data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" 
              aria-label="Toggle navigation"
              style="border-color: #a1887f;">
        <span class="navbar-toggler-icon" style="filter: invert(1) sepia(1) saturate(5) hue-rotate(320deg);"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link px-3" routerLink="/design" style="color: #8d6e63 !important; font-weight: bold;"><span class="me-1">🏠</span>עיצוב חדרים</a></li>
          <li class="nav-item"><a class="nav-link px-3" routerLink="/admin" style="color: #8d6e63 !important; font-weight: bold;"><span class="me-1">⚙️</span>אזור מנהל</a></li>
          <li class="nav-item"><a class="nav-link px-3" routerLink="/auth" style="color: #8d6e63 !important; font-weight: bold;"><span class="me-1">👤</span>התחברות</a></li>
        </ul>
      </div>
    </div>
  </nav>
  
  <!-- Content Container -->
  <div class="flex-1 flex items-center justify-center p-4 pb-12">
    
    <!-- Auth Card -->
    <div class="w-full max-w-md bg-[#fffdf5]/90 backdrop-blur border border-[#d7ccc8] rounded-2xl shadow-xl p-8 flex flex-col gap-6 my-8">
      
      <!-- Logo/Icon -->
      <div class="flex flex-col items-center gap-2">
        <div class="p-3 bg-[#efebe9] rounded-full border border-[#d7ccc8]">
          <img src="/images/icons/person.png" class="w-6 h-6">
        </div>
        <h2 class="text-2xl font-bold text-[#4e342e]">
          {{ isLoginMode ? 'התחברות' : 'הרשמה' }}
        </h2>
        <p class="text-sm text-[#8d6e63]">
          {{ isLoginMode ? 'ברוכים הבאים! אנא התחברו לחשבונכם' : 'הצטרפו אלינו והתחילו לעצב' }}
        </p>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm flex items-start gap-2">
        <img src="/images/icons/details.png" class="w-4 h-4 mt-0.5">
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Login Form -->
      <form *ngIf="isLoginMode" [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex flex-col gap-4">
        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">אימייל / שם משתמש</label>
          <input 
            type="text" 
            formControlName="email"
            class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] placeholder-[#a1887f] focus:outline-none focus:border-[#8d6e63] focus:ring-1 focus:ring-[#8d6e63] transition"
            placeholder="הכנס אימייל או שם משתמש">
        </div>
        
        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">סיסמה</label>
          <input 
            type="password" 
            formControlName="password"
            class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] placeholder-[#a1887f] focus:outline-none focus:border-[#8d6e63] focus:ring-1 focus:ring-[#8d6e63] transition"
            placeholder="••••••••">
        </div>
        
        <button 
          type="submit" 
          [disabled]="!loginForm.valid || isLoading"
          class="mt-2 w-full h-11 bg-[#5d4037] hover:bg-[#4e342e] text-[#fffdf5] font-bold rounded-xl shadow-md disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center justify-center gap-2">
          <span *ngIf="isLoading" class="animate-spin text-lg">↻</span>
          <span>{{ isLoading ? 'מתחבר...' : 'התחברות' }}</span>
        </button>
      </form>

      <!-- Register Form -->
      <form *ngIf="!isLoginMode" [formGroup]="registerForm" (ngSubmit)="onRegister()" class="flex flex-col gap-3">
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-xs font-bold text-[#8d6e63] mr-1">שם פרטי</label>
            <input type="text" formControlName="firstName" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="ישראל">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-[#8d6e63] mr-1">שם משפחה</label>
            <input type="text" formControlName="lastName" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="ישראלי">
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">אימייל</label>
          <input type="email" formControlName="email" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="example@mail.com">
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">סיסמה</label>
          <input type="password" formControlName="password" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="••••••••">
          
          <!-- Password Strength -->
          <div class="mt-1 flex items-center gap-2" *ngIf="registerForm.get('password')?.value">
            <div class="flex-1 h-1.5 bg-[#efebe9] rounded-full overflow-hidden">
              <div class="h-full transition-all duration-300"
                   [style.width.%]="(passwordStrength / 4) * 100"
                   [class.bg-red-400]="passwordStrength <= 1"
                   [class.bg-yellow-400]="passwordStrength === 2"
                   [class.bg-green-500]="passwordStrength >= 3">
              </div>
            </div>
            <span class="text-[10px] text-[#8d6e63]">{{ passwordStrengthLabel }}</span>
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">כתובת</label>
          <input type="text" formControlName="address" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="רחוב ומספר, עיר">
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">טלפון</label>
          <input type="tel" formControlName="phone" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="050-0000000">
        </div>

        <button 
          type="submit" 
          [disabled]="!registerForm.valid || isLoading"
          class="mt-2 w-full h-11 bg-[#5d4037] hover:bg-[#4e342e] text-[#fffdf5] font-bold rounded-xl shadow-md disabled:opacity-50 disabled:cursor-not-allowed transition">
          {{ isLoading ? 'נרשם...' : 'הרשמה' }}
        </button>
      </form>

      <!-- Footer Actions -->
      <div class="flex flex-col gap-3 pt-4 border-t border-[#d7ccc8]/50">
        
        <!-- Toggle Login/Register -->
        <button 
          class="text-sm font-medium text-[#8d6e63] hover:text-[#5d4037] hover:underline transition text-center"
          (click)="switchAuthMode()">
          {{ isLoginMode ? 'אין לך חשבון? הירשם כאן' : 'יש לך כבר חשבון? התחבר' }}
        </button>

        <!-- Guest Login (Make it more prominent) -->
        <button 
          class="w-full py-2.5 bg-[#efebe9] hover:bg-[#d7ccc8] text-[#5d4037] font-bold rounded-xl transition text-sm flex items-center justify-center gap-2 border border-[#d7ccc8]"
          (click)="guestLogin()">
          <img src="/images/icons/person_add.png" class="w-4 h-4">
          <span>כניסה כאורח (ללא חשבון)</span>
        </button>
      </div>

    </div>
  </div>
</div>

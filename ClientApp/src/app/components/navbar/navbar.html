<!-- תפריט ניווט עליון - Room Design Studio -->
<nav class="navbar navbar-expand-lg navbar-dark" 
     *ngIf="isAuthPage"
     style="background: #efebe9 !important; border-bottom: 1px solid #d7ccc8; box-shadow: none;">
  <div class="container-fluid">
    <!-- שם האפליקציה -->
    <a class="navbar-brand fw-bold" routerLink="/" style="color: #5d4037 !important; letter-spacing: 0;">
      🏠 {{ appName }}
    </a>
    
    <!-- כפתור תפריט נייד -->
    <button class="navbar-toggler" type="button" 
            data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" 
            aria-label="Toggle navigation"
            style="border-color: #a1887f;">
      <span class="navbar-toggler-icon" style="filter: invert(1) sepia(1) saturate(5) hue-rotate(320deg);"></span>
    </button>
    
    <!-- קישורי ניווט -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" *ngFor="let link of navLinks">
          <a class="nav-link px-3" 
             [routerLink]="link.path" 
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }"
             style="color: #8d6e63 !important; font-weight: bold;">
            <span class="me-1">{{ link.icon }}</span>
            {{ link.label }}
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

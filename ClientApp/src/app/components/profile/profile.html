<!-- Profile Page - Cream & Wood Theme -->
<div class="flex flex-col h-screen w-screen overflow-hidden bg-[linear-gradient(135deg,#fdfbf7_0%,#a68b6c_100%)] text-[#5d4037] font-sans" dir="rtl">
  
  <!-- Content Container -->
  <div class="flex-1 overflow-y-auto min-h-0 pb-10">
    <div class="min-h-full flex items-center justify-center p-4">
    
    <!-- Profile Card -->
    <div class="w-full max-w-lg bg-[#fffdf5]/90 backdrop-blur border border-[#d7ccc8] rounded-2xl shadow-xl p-8 flex flex-col gap-6 relative">
      
      <!-- Close Button -->
      <button (click)="goBack()" class="absolute top-4 left-4 w-8 h-8 flex items-center justify-center text-[#8d6e63] hover:text-[#5d4037] hover:bg-[#efebe9] rounded-full transition">
        ✕
      </button>

      <!-- Header -->
      <div class="flex flex-col items-center gap-2">
        <div class="p-3 bg-[#efebe9] rounded-full border border-[#d7ccc8]">
          <span class="text-2xl">✏️</span>
        </div>
        <h2 class="text-2xl font-bold text-[#4e342e]">עדכון פרטים</h2>
        <p class="text-sm text-[#8d6e63]" *ngIf="currentUser">
          שלום {{ currentUser.firstName }}, כאן תוכל לעדכן את פרטיך
        </p>
      </div>

      <!-- Messages -->
      <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm text-center">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm text-center">
        {{ successMessage }}
      </div>

      <!-- Profile Form -->
      <form [formGroup]="profileForm" (ngSubmit)="onUpdate()" class="flex flex-col gap-4">
        
        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">שם משתמש</label>
          <input 
            type="text" 
            formControlName="userName"
            class="w-full h-10 px-3 bg-[#efebe9]/50 border border-[#d7ccc8] rounded-xl text-[#8d6e63] cursor-not-allowed"
            placeholder="שם משתמש">
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-xs font-bold text-[#8d6e63] mr-1">שם פרטי</label>
            <input type="text" formControlName="firstName" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="שם פרטי">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-[#8d6e63] mr-1">שם משפחה</label>
            <input type="text" formControlName="lastName" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="שם משפחה">
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">כתובת</label>
          <input type="text" formControlName="address" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="כתובת מגורים">
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">טלפון</label>
          <input type="tel" formControlName="phone" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="מספר טלפון">
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-[#8d6e63] mr-1">סיסמה חדשה (אופציונלי)</label>
          <input type="password" formControlName="password" class="w-full h-10 px-3 bg-white border border-[#d7ccc8] rounded-xl text-[#5d4037] focus:outline-none focus:border-[#8d6e63]" placeholder="השאיר ריק אם אין שינוי">
          
          <!-- Password Strength -->
          <div class="mt-1 flex items-center gap-2" *ngIf="profileForm.get('password')?.value">
            <div class="flex-1 h-1.5 bg-[#efebe9] rounded-full overflow-hidden">
              <div class="h-full transition-all duration-300"
                   [style.width.%]="(passwordStrength / 4) * 100"
                   [class.bg-red-400]="passwordStrength <= 1"
                   [class.bg-yellow-400]="passwordStrength === 2"
                   [class.bg-green-500]="passwordStrength >= 3">
              </div>
            </div>
            <span class="text-[10px] text-[#8d6e63]">{{ passwordStrengthLabel }}</span>
          </div>
        </div>

        <div class="flex flex-col gap-2 mt-2">
          <button 
            type="submit" 
            [disabled]="!profileForm.valid || isLoading"
            class="w-full h-11 bg-[#5d4037] hover:bg-[#4e342e] text-[#fffdf5] font-bold rounded-xl shadow-md disabled:opacity-50 transition">
            {{ isLoading ? 'שומר שינויים...' : 'שמור שינויים' }}
          </button>
          
          <button 
            type="button" 
            (click)="goBack()"
            class="w-full h-11 bg-transparent hover:bg-[#efebe9] text-[#8d6e63] hover:text-[#5d4037] font-medium rounded-xl transition">
            ביטול חזרה
          </button>
        </div>

      </form>
    </div>
  </div>
  </div>
</div>

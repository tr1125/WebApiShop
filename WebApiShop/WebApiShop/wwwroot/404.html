<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - דף לא נמצא</title>
    <link rel="icon" type="image/x-icon" href="http://localhost:4200/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #fdfbf7 0%, #a68b6c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5d4037;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 253, 245, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #d7ccc8;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            height: 80vh;
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            background: linear-gradient(135deg, #a68b6c 0%, #8d6e63 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            line-height: 1;
        }

        h1 {
            font-size: 32px;
            color: #5d4037;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: #8d6e63;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .icon {
            width: 60px;          
            height: 60px;         
            border-radius: 50%;  
            object-fit: cover;    
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a, button {
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a68b6c 0%, #8d6e63 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(166, 139, 108, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(166, 139, 108, 0.4);
        }

        .btn-secondary {
            background: #efebe9;
            color: #5d4037;
            border: 1px solid #d7ccc8;
        }

        .btn-secondary:hover {
            background: #d7ccc8;
            border-color: #bcaaa4;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #d7ccc8, transparent);
            margin: 30px 0;
        }

        .footer-text {
            font-size: 12px;
            color: #a1887f;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="http://localhost:4200/images/icons/logo.png" class="icon" alt="404 Icon">

        <div class="error-code">404</div>
        <h1>דף לא נמצא</h1>
        <p>סוריי! נראה שהדף שחיפשת לא קיים או הועבר למקום אחר.</p>
        
        <div class="button-group">
            <a href="http://localhost:4200/auth" class="btn-primary">חזור לעמוד הבית</a>
            <button class="btn-secondary" onclick="history.back()">חזור אחורה</button>
        </div>

        <div class="divider"></div>
        <p class="footer-text">אם אתה חושב שזו טעות, אנא צור קשר עם תמיכה</p>
    </div>
</body>
</html>
